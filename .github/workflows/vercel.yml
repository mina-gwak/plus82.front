name: Deployment Notification to Discord

on:
  deployment_status:
  deployment:

jobs:
  notify-discord:
    name: Notify Discord on Deployment Status
    runs-on: ubuntu-latest

    steps:
      - name: Debug Deployment Info
        run: |
          echo "Event Name: ${{ github.event_name }}"
          echo "Deployment Status: ${{ github.event.deployment_status.state }}"
          echo "Environment: ${{ github.event.deployment.environment }}"
          echo "Creator: ${{ github.event.deployment.creator.login }}"

      - name: Notify Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ "${{ github.event_name }}" == "deployment_status" ]; then
            STATUS="${{ github.event.deployment_status.state }}"
            URL="${{ github.event.deployment_status.target_url }}"
          else
            STATUS="started"
            URL="${{ github.event.deployment.url }}"
          fi
          
          ENVIRONMENT="${{ github.event.deployment.environment }}"
          MESSAGE="🚀 Deployment $STATUS 🚀\nENVIRONMENT: $ENVIRONMENT\nURL: $URL\n"
          curl -H "Content-Type: application/json" \
               -d "{\"content\": \"$MESSAGE\"}" \
               $DISCORD_WEBHOOK_URL